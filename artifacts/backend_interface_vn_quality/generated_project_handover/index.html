<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VN 剧情树与背景工作台</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="wrap">
    <header class="hero">
      <img class="logo" src="./assets/logo.png" alt="VN Logo" />
      <div>
        <h1>VN 剧情树与背景工作台</h1>
        <p>用于梳理剧情树、角色设定、场景背景，并导出结构化内容。</p>
      </div>
    </header>

    <section class="panel">
      <h2>项目基础</h2>
      <label>项目名</label>
      <input id="projectTitle" value="雾港回声：分歧之夜" />
      <label>一句话概述</label>
      <textarea id="projectPitch">返乡摄影师卷入旧案，在真相与保护挚友之间做选择。</textarea>
    </section>

    <section class="panel split">
      <article>
        <h2>剧情树节点</h2>
        <div id="nodes"></div>
      </article>
      <article>
        <h2>预览图</h2>
        <img class="preview" src="./preview.png" alt="项目预览图" />
      </article>
    </section>

    <section class="panel">
      <h2>导出</h2>
      <div class="actions">
        <button id="btnJson">导出 JSON</button>
        <button id="btnMd">导出 Markdown 提纲</button>
      </div>
      <pre id="output"></pre>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
